version: "3.8"
services:
  groq-proxy:
    build: .
    image: proxyapi:1.0.0
    container_name: proxyapi
    restart: unless-stopped
    environment:
      - DENO_TARGET_HOST=api.groq.com
    ports:
      - "127.0.0.1:8000:8000" # 仅绑定到本机，避免直接对外暴露
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
