name: Build and Push to DockerHub Manual

on:
  workflow_dispatch:  # 手动触发

env:
  REGISTRY: docker.io
  NAMESPACE: xiongli870110        # DockerHub 用户名
  IMAGE_NAME: proxyapi
  VERSION: 1.0.2           # 👈 在这里定义版本变量

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GH_TOKEN=${{ secrets.GH_TOKEN }}
          tags: >-
            ${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }},
            ${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

      - name: Print success message
        run: |
          echo "✅ 镜像已推送到 DockerHub:"
          echo "   ${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "   ${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}"

      - name: Show image details
        run: |
          docker buildx imagetools inspect ${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker buildx imagetools inspect ${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
